---
# Envoy ConfigMap - Simplified with Local Rate Limiting
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config-simple
  namespace: api-platform
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901

    static_resources:
      listeners:
      - name: listener_http
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 10000
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress_http
              codec_type: AUTO
              access_log:
              - name: envoy.access_loggers.stdout
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                  log_format:
                    text_format_source:
                      inline_string: "[%START_TIME%] \"%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%\" %RESPONSE_CODE% %RESPONSE_FLAGS% %BYTES_RECEIVED% %BYTES_SENT% %DURATION% \"%REQ(X-FORWARDED-FOR)%\" \"%REQ(USER-AGENT)%\" \"%REQ(X-REQUEST-ID)%\"\n"
              route_config:
                name: local_route
                virtual_hosts:
                - name: backend
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: kong_cluster
                      timeout: 30s
              http_filters:
              # Local rate limiting for DDoS protection
              - name: envoy.filters.http.local_ratelimit
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                  stat_prefix: http_local_rate_limiter
                  token_bucket:
                    max_tokens: 10
                    tokens_per_fill: 10
                    fill_interval: 60s
                  filter_enabled:
                    runtime_key: local_rate_limit_enabled
                    default_value:
                      numerator: 100
                      denominator: HUNDRED
                  filter_enforced:
                    runtime_key: local_rate_limit_enforced
                    default_value:
                      numerator: 100
                      denominator: HUNDRED
                  response_headers_to_add:
                  - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                    header:
                      key: x-rate-limit
                      value: 'enforced'
                  status:
                    code: 429
              # Router filter (must be last)
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
      - name: kong_cluster
        connect_timeout: 5s
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: kong_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: kong-proxy.api-platform.svc.cluster.local
                    port_value: 80
        health_checks:
        - timeout: 5s
          interval: 10s
          unhealthy_threshold: 2
          healthy_threshold: 2
          http_health_check:
            path: "/health"
        # Circuit breaker for DDoS protection
        circuit_breakers:
          thresholds:
          - priority: DEFAULT
            max_connections: 10
            max_pending_requests: 1000
            max_requests: 1000
            max_retries: 3
        # Connection limits
        common_lb_config:
          healthy_panic_threshold:
            value: 50.0

---
# Envoy Proxy Deployment - Simplified
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy-proxy-simple
  namespace: api-platform
  labels:
    app: envoy
    version: simple
spec:
  replicas: 2
  selector:
    matchLabels:
      app: envoy
      version: simple
  template:
    metadata:
      labels:
        app: envoy
        version: simple
    spec:
      containers:
      - name: envoy
        image: envoyproxy/envoy:v1.28-latest
        ports:
        - name: http
          containerPort: 10000
        - name: admin
          containerPort: 9901
        volumeMounts:
        - name: config
          mountPath: /etc/envoy
        command:
        - /usr/local/bin/envoy
        args:
        - -c
        - /etc/envoy/envoy.yaml
        - --service-cluster
        - envoy-ddos-protection
        - --service-node
        - envoy-proxy
        - --log-level
        - info
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /ready
            port: 9901
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 9901
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
      volumes:
      - name: config
        configMap:
          name: envoy-config-simple

---
apiVersion: v1
kind: Service
metadata:
  name: envoy-proxy-simple
  namespace: api-platform
  labels:
    app: envoy
    version: simple
spec:
  type: NodePort
  ports:
  - name: http
    port: 80
    targetPort: 10000
    nodePort: 30082
  - name: admin
    port: 9901
    targetPort: 9901
    nodePort: 30091
  selector:
    app: envoy
    version: simple
