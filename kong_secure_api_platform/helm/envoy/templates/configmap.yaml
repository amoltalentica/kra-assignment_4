apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "envoy-ddos.labels" . | nindent 4 }}
  annotations:
    # Checksum forces pod restart when config changes
    checksum/config: "{{ include "envoy-ddos.name" . }}"
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: {{ .Values.service.adminTargetPort }}

    static_resources:
      listeners:
      - name: listener_http
        address:
          socket_address:
            address: 0.0.0.0
            port_value: {{ .Values.service.httpTargetPort }}
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress_http
              codec_type: AUTO
              access_log:
              - name: envoy.access_loggers.stdout
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                  log_format:
                    text_format_source:
                      inline_string: "[%START_TIME%] \"%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%\" %RESPONSE_CODE% %RESPONSE_FLAGS% %BYTES_SENT% %DURATION%ms\n"
              route_config:
                name: local_route
                virtual_hosts:
                - name: backend
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: kong_cluster
                      timeout: 30s
              http_filters:
              # ── DDoS Protection: local rate limiting (token bucket) ───────
              - name: envoy.filters.http.local_ratelimit
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                  stat_prefix: http_local_rate_limiter
                  token_bucket:
                    max_tokens: {{ .Values.rateLimiting.maxTokens }}
                    tokens_per_fill: {{ .Values.rateLimiting.tokensPerFill }}
                    fill_interval: {{ .Values.rateLimiting.fillInterval }}
                  filter_enabled:
                    runtime_key: local_rate_limit_enabled
                    default_value:
                      numerator: 100
                      denominator: HUNDRED
                  filter_enforced:
                    runtime_key: local_rate_limit_enforced
                    default_value:
                      numerator: 100
                      denominator: HUNDRED
                  response_headers_to_add:
                  - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                    header:
                      key: x-rate-limit
                      value: 'enforced'
                  status:
                    code: 429
              # ── Router (must be last) ─────────────────────────────────────
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
      - name: kong_cluster
        connect_timeout: 5s
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: kong_cluster
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: {{ .Values.upstream.host }}
                    port_value: {{ .Values.upstream.port }}
        health_checks:
        - timeout: {{ .Values.healthCheck.timeout }}
          interval: {{ .Values.healthCheck.interval }}
          unhealthy_threshold: 2
          healthy_threshold: 2
          http_health_check:
            path: {{ .Values.healthCheck.path | quote }}
        # ── Circuit Breaker: DDoS overflow protection ──────────────────
        circuit_breakers:
          thresholds:
          - priority: DEFAULT
            max_connections: {{ .Values.circuitBreaker.maxConnections }}
            max_pending_requests: {{ .Values.circuitBreaker.maxPendingRequests }}
            max_requests: {{ .Values.circuitBreaker.maxRequests }}
            max_retries: {{ .Values.circuitBreaker.maxRetries }}
        common_lb_config:
          healthy_panic_threshold:
            value: 50.0
