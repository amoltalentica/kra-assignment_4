{{/*
Kong declarative config ConfigMap
Includes: JWT consumer, rate-limiting, IP restriction, custom Lua plugin on all routes
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-declarative-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kong-gateway.labels" . | nindent 4 }}
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    # ──────────────────────────────────────────────────────────────────
    # JWT Consumer — key must match the 'iss' claim in tokens issued
    # by the user-service.  Secret must match JWT_SECRET_KEY env var.
    # ──────────────────────────────────────────────────────────────────
    consumers:
      - username: {{ .Values.jwt.consumer.username | quote }}
        jwt_secrets:
          - algorithm: HS256
            key: {{ .Values.jwt.consumer.key | quote }}
            secret: {{ .Values.jwt.consumer.secret | quote }}

    # ──────────────────────────────────────────────────────────────────
    # Global plugins (applied to every request)
    # ──────────────────────────────────────────────────────────────────
    plugins:
      - name: correlation-id
        config:
          header_name: X-Correlation-ID
          generator: uuid
          echo_downstream: true

    # ──────────────────────────────────────────────────────────────────
    # Upstream service + per-route plugin config
    # ──────────────────────────────────────────────────────────────────
    services:
      - name: user-service
        host: {{ .Values.userService.host | quote }}
        port: {{ .Values.userService.port }}
        protocol: http
        path: /
        connect_timeout: 60000
        write_timeout: 60000
        read_timeout: 60000

        routes:

          # ── /health — PUBLIC (no JWT) ────────────────────────────
          - name: health-route
            paths:
              - ~/health$
            strip_path: false
            methods:
              - GET
            protocols:
              - http
            plugins:
              - name: rate-limiting
                config:
                  minute: {{ .Values.rateLimiting.minute }}
                  hour: {{ .Values.rateLimiting.hour }}
                  policy: {{ .Values.rateLimiting.policy | quote }}
                  hide_client_headers: {{ .Values.rateLimiting.hideClientHeaders }}
              - name: custom-token-validator
                config:
                  inject_headers: {{ .Values.customPlugin.enabled }}
                  service_name: {{ .Values.customPlugin.serviceName | quote }}

          # ── /verify — PUBLIC (no JWT, authentication bypass) ────
          - name: verify-route
            paths:
              - ~/verify$
            strip_path: false
            methods:
              - GET
            protocols:
              - http
            plugins:
              - name: rate-limiting
                config:
                  minute: {{ .Values.rateLimiting.minute }}
                  hour: {{ .Values.rateLimiting.hour }}
                  policy: {{ .Values.rateLimiting.policy | quote }}
                  hide_client_headers: {{ .Values.rateLimiting.hideClientHeaders }}
              - name: custom-token-validator
                config:
                  inject_headers: {{ .Values.customPlugin.enabled }}
                  service_name: {{ .Values.customPlugin.serviceName | quote }}

          # ── /login — PUBLIC (no JWT, rate limited) ──────────────
          - name: login-route
            paths:
              - ~/login$
            strip_path: false
            methods:
              - POST
            protocols:
              - http
            plugins:
              - name: rate-limiting
                config:
                  minute: 5
                  policy: {{ .Values.rateLimiting.policy | quote }}
                  hide_client_headers: {{ .Values.rateLimiting.hideClientHeaders }}
              - name: custom-token-validator
                config:
                  inject_headers: {{ .Values.customPlugin.enabled }}
                  service_name: {{ .Values.customPlugin.serviceName | quote }}

          # ── /users — PROTECTED (JWT + rate-limit + IP allow-list)
          - name: users-route
            paths:
              - ~/users
            strip_path: false
            methods:
              - GET
              - POST
            protocols:
              - http
            plugins:
              - name: jwt
                config:
                  key_claim_name: {{ .Values.jwt.keyClaimName | quote }}
                  claims_to_verify:
                    - exp
                  secret_is_base64: false
                  run_on_preflight: true
              - name: rate-limiting
                config:
                  minute: {{ .Values.rateLimiting.minute }}
                  hour: {{ .Values.rateLimiting.hour }}
                  policy: {{ .Values.rateLimiting.policy | quote }}
                  hide_client_headers: {{ .Values.rateLimiting.hideClientHeaders }}
              - name: ip-restriction
                config:
                  allow:
{{- range .Values.ipRestriction.whitelist }}
                    - {{ . | quote }}
{{- end }}
              - name: custom-token-validator
                config:
                  inject_headers: {{ .Values.customPlugin.enabled }}
                  service_name: {{ .Values.customPlugin.serviceName | quote }}
